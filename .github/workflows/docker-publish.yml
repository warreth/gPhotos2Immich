name: Build and Publish gPhotos2Immich Docker Image

on:
    release:
        types: [published]
    workflow_dispatch:
        inputs:
            version:
                description: "Docker Tag Version"
                required: false
                type: string

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository_owner }}/gphotos2immich

concurrency:
    group: docker-publish-${{ github.ref }}
    cancel-in-progress: false

jobs:
    build-and-push:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Log in to the Container registry
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract metadata (tags, labels) for Docker
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                  tags: |
                      type=raw,value=latest
                      type=sha
                      type=raw,value=${{ github.event.release.tag_name }},enable=${{ github.event_name == 'release' }}
                      type=raw,value=${{ inputs.version }},enable=${{ github.event_name == 'workflow_dispatch' && inputs.version != '' }}

            - name: Build and push Docker image
              uses: docker/build-push-action@v5
              with:
                  context: .
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
